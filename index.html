<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Répertoire des templates de véhicules pour FiveM. Trouvez facilement les modèles 3D et textures pour vos serveurs RP.">
    <title>FiveM Vehicle Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="glass-header">
        <div class="header-content">
            <h1>FiveM <span>Templates</span></h1>
            <p id="templateCounter">Le répertoire ultime pour les véhicules de ton serveur.</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Rechercher un modèle (ex: Police, EMS, Vapid, Bravado...)">
            </div>
        </div>
    </header>

    <main>
        <section class="templates-grid" id="templatesGrid">
            <!-- Les templates seront injectés ici par le JavaScript -->
        </section>
        
        <div id="pagination" class="pagination-container">
            <!-- Les boutons de pagination seront injectés ici -->
        </div>
    </main>

    <footer>
        <p>Créé pour la communauté FiveM | Hébergé via GitHub Pages</p>
    </footer>

    <button id="scrollTopBtn" class="scroll-top-btn" title="Remonter en haut">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
